name: Daily Notion Task Email

on:
  schedule:
    # 6:30 AM Central time, weekdays
    - cron: "30 6 * * 1-5"
      timezone: "America/Chicago"
  workflow_dispatch:

jobs:
  send-task-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send Notion task email
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TASKS_DATABASE_ID: ${{ secrets.NOTION_TASKS_DATABASE_ID }}

          EMAIL_FROM: ian.hartsook@gmail.com
          EMAIL_TO: ihartsook@huttonbuilds.com
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USERNAME: ian.hartsook@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

          TIME_ZONE: America/Chicago
          TASK_EMAIL_CONFIG: dailyEmail/task_email_config.json
        run: python dailyEmail/todays_schedule_email.py
