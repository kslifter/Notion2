name: Daily Notion Task Email

on:
  schedule:
    # 6:30 AM Central time, weekdays. Change to "* * *" day fields if you want weekends too.
    - cron: "30 6 * * 1-5"
      timezone: "America/Chicago"
  workflow_dispatch:

jobs:
  send-task-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send Notion task email
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TASKS_DATABASE_ID: ${{ secrets.NOTION_TASKS_DATABASE_ID }}

          # Email. For Gmail SMTP, SMTP_PASSWORD should be an app password for ian.hartsook@gmail.com.
          EMAIL_FROM: ian.hartsook@gmail.com
          EMAIL_TO: ihartsook@huttonbuilds.com
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USERNAME: ian.hartsook@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

          # Notion view/filter settings from your screenshot.
          TIME_ZONE: America/Chicago
          DB_ENTRY_TYPE_PROPERTY: DB ENTRY TYPE
          DB_ENTRY_TYPE_VALUES: Task
          ASSIGNEE_PROPERTY: ASSIGNEE
          ASSIGNEE_MATCHES: Ian Hartsook,ihartsook@huttonbuilds.com
          PROJECT_STATUS_PROPERTY: Project Status
          PROJECT_STATUS_VALUES: In progress
          #INTERNAL_PROJECT_PROPERTY: Internal Project
          #INTERNAL_PROJECT_VALUE: false
          STATUS_PROPERTY: STATUS
          STATUS_VALUES: In progress
          PROJECT_PROPERTY: HT Project
          DUE_DATE_PROPERTY: DUE DATE
          PRIORITY_PROPERTY: PRIORITY

          # Options: all_open, due_today_overdue, next_7_days
          DUE_MODE: all_open
        run: python dailyEmail/todays_schedule_email.py
